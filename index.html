<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abarrotes La Estrella</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-image: url("img/logo.png");
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    font-family: Arial;
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

.left {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.left a {
    color: black;
    text-decoration: none;
    font-weight: bold;
}

.left a:hover {
    color: #f1c40f;
}

.right a {
    background: #2c3e50;
    padding: 10px 15px;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.titulo {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
}

.titulo h1 {
    font-size: 50px;
}

.titulo p {
    font-size: 20px;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SLIDER */
.slider {
    position: relative;
    width: 85%;
    max-width: 900px;
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.slides {
    display: flex;
    transition: transform 0.8s ease;
}

.slide {
    width: 100%;
    flex-shrink: 0;
}

.slide img {
    width: 100%;
    height: 420px;
    object-fit: contain;
}

.prev, .next {
    position: absolute;
    top: 15px;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    padding: 15px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

footer {
    background: rgba(0,0,0,0.85);
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header class="header">
    <div class="left">
        <a href="informacion.html">Información</a>
        <a href="contacto.html">Contacto</a>
        <a href="domicilio.html">A domicilio</a>
        <a href="ofertas.html">Ofertas</a>
    </div>

    <div class="right">
        <a href="menu.html">Menú</a>
    </div>
</header>

<div class="titulo">
    <h1>Abarrotes La Estrella</h1>
    <p>Tu tienda de confianza</p>
</div>

<main>

<div class="slider">
    <div class="slides" id="sliderContainer">

        <div class="slide"><img src="img/tienda1.jpg"></div>
        <div class="slide"><img src="img/tienda2.jpg"></div>
        <div class="slide"><img src="img/tienda3.jpg"></div>
        <div class="slide"><img src="img/tienda4.jpg"></div>

    </div>

    <button class="prev" onclick="moveSlide(-1)">❮</button>
    <button class="next" onclick="moveSlide(1)">❯</button>
</div>

</main>

<footer>
@ 2026 Abarrotes La Estrella
</footer>

<script>
let currentIndex = 0;
let intervalo;

const slides = document.querySelectorAll('.slide');
const sliderContainer = document.getElementById('sliderContainer');
const totalSlides = slides.length;

function updateSlider(){
const offset = -currentIndex * 100;
sliderContainer.style.transform = `translateX(${offset}%)`;
}

function startSlider(){
intervalo = setInterval(()=>{
currentIndex = (currentIndex + 1) % totalSlides;
updateSlider();
},4000);
}

function moveSlide(direction){
currentIndex = (currentIndex + direction + totalSlides) % totalSlides;
updateSlider();
}

sliderContainer.addEventListener("mouseenter", ()=>clearInterval(intervalo));
sliderContainer.addEventListener("mouseleave", startSlider);

window.onload = () => {
updateSlider();
startSlider();
};
</script>

</body>
</html>
